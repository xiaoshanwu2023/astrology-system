<!-- 
  增强版详细运势解读模态框组件
  支持行星逆行、日月食显示
-->

<!-- 运势解读模态框 -->
<div id="enhancedFortuneModal" class="fortune-modal">
  <div class="fortune-modal-overlay"></div>
  <div class="fortune-modal-content cosmic-card">
    <!-- 关闭按钮 -->
    <button class="fortune-modal-close" aria-label="关闭">
      <span>×</span>
    </button>
    
    <!-- 头部 -->
    <div class="fortune-modal-header">
      <div class="fortune-icon">🌟</div>
      <h2 class="fortune-title">详细运势解读</h2>
      <div class="fortune-subtitle" id="fortuneSubtitle">正在连接宇宙能量...</div>
    </div>
    
    <!-- 加载状态 -->
    <div id="fortuneLoading" class="fortune-loading">
      <div class="cosmic-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <p class="loading-text">正在解读星象...</p>
      <p class="loading-subtext">Susan Miller为您揭示宇宙讯息</p>
    </div>
    
    <!-- 内容区域 -->
    <div id="fortuneContent" class="fortune-content" style="display: none;">
      <!-- 运势头部信息 -->
      <div class="fortune-header-info">
        <div class="sign-badge" id="fortuneSignBadge">
          <span class="sign-icon">♈</span>
          <span class="sign-name" id="fortuneSignName">白羊座</span>
        </div>
        <div class="date-badge" id="fortuneDateBadge">
          <span class="date-label">行运日期</span>
          <span class="date-value" id="fortuneDate">--</span>
        </div>
        <div class="sentiment-badge" id="fortuneSentiment">
          <span class="sentiment-label">整体运势</span>
          <span class="sentiment-value sentiment-positive">非常积极</span>
        </div>
      </div>
      
      <!-- 运势正文 -->
      <div class="fortune-reading-text" id="fortuneReadingText">
        <!-- 动态插入解读内容 -->
      </div>
      
      <!-- 底部信息 -->
      <div class="fortune-footer">
        <p class="fortune-source">💫 解读风格：Susan Miller温暖鼓励式占星</p>
        <p class="fortune-disclaimer">*运势解读仅供参考，请理性看待</p>
      </div>
    </div>
    
    <!-- 错误状态 -->
    <div id="fortuneError" class="fortune-error" style="display: none;">
      <div class="error-icon">⚠️</div>
      <h3>获取运势解读失败</h3>
      <p id="errorMessage">请稍后重试</p>
      <button class="btn-retry" id="retryBtn">重新尝试</button>
    </div>
  </div>
</div>

<!-- 背景星空效果（可选） -->
<div class="fortune-stars-bg" id="fortuneStarsBg"></div>
